name: selftest

# Proves the ORAS <-> GHCR roundtrip end-to-end using only the repo's own
# GITHUB_TOKEN (which can push to this repo's own org package). Seeds fake cache
# content, saves it, wipes it, restores it, and asserts it came back byte-for-byte.
# This validates the mechanism without needing any cross-repo access grant.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  roundtrip:
    # Exercise the real save -> wipe -> restore round-trip on every runner OS.
    # Windows (MSYS git-bash GNU tar) is the one with the drive-letter/backslash
    # path hazards (CIRISCache#1); macOS uses BSD tar (no --force-local). ubuntu
    # is the GNU-tar/Linux baseline. fail-fast off so one OS failing still shows
    # the others. Each OS uses a distinct key so the legs do not collide.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Seed deterministic "cache" content under the real cache locations.
      # cmp (not sha256sum) does the byte-identical check — portable across
      # git-bash and macOS where sha256sum may be absent (it's shasum there).
      - name: Seed fake cache
        shell: bash
        run: |
          mkdir -p ~/.cargo/registry/cache target/deps
          echo "marker-${GITHUB_SHA}" > target/deps/ciriscache_marker.txt
          head -c 1048576 /dev/urandom > ~/.cargo/registry/cache/blob.bin
          cp ~/.cargo/registry/cache/blob.bin ~/ciriscache_blob.before

      - name: Save
        uses: ./save
        with:
          package: ghcr.io/cirisai/ciriscache-selftest
          key: selftest-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          paths: "~/.cargo/registry/cache target/deps"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wipe local copies
        shell: bash
        run: rm -rf ~/.cargo/registry/cache target

      - name: Restore
        id: restore
        uses: ./restore
        with:
          package: ghcr.io/cirisai/ciriscache-selftest
          key: selftest-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          token: ${{ secrets.GITHUB_TOKEN }}   # selftest package is private → auth pull

      - name: Assert roundtrip
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.restore.outputs.cache-hit }}" = "true" || { echo "expected a cache HIT"; exit 1; }
          cmp ~/.cargo/registry/cache/blob.bin ~/ciriscache_blob.before
          grep -q "marker-${GITHUB_SHA}" target/deps/ciriscache_marker.txt
          echo "✅ CIRISCache GHCR roundtrip verified on ${{ matrix.os }} (save → wipe → restore, byte-identical)"

      - name: Miss path returns cleanly
        id: miss
        uses: ./restore
        with:
          package: ghcr.io/cirisai/ciriscache-selftest
          key: definitely-not-a-real-key-${{ matrix.os }}-${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - shell: bash
        run: |
          test "${{ steps.miss.outputs.cache-hit }}" = "false" || { echo "miss should report cache-hit=false"; exit 1; }
          echo "✅ cold-miss handled cleanly on ${{ matrix.os }}"

      # v2 multi-key first-hit-wins: a priority list whose first key MISSES and a
      # later key HITS must restore the later one (and report it via `key`).
      - name: Wipe again before multi-key restore
        shell: bash
        run: rm -rf ~/.cargo/registry/cache target
      - name: Restore (multi-key — first misses, second hits)
        id: multi
        uses: ./restore
        with:
          package: ghcr.io/cirisai/ciriscache-selftest
          keys: |
            no-such-key-${{ matrix.os }}-${{ github.run_id }}
            selftest-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.multi.outputs.cache-hit }}" = "true" || { echo "multi-key: expected the 2nd key to HIT"; exit 1; }
          test "${{ steps.multi.outputs.key }}" = "selftest-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}" \
            || { echo "multi-key: key output should be the matched 2nd key, got '${{ steps.multi.outputs.key }}'"; exit 1; }
          cmp ~/.cargo/registry/cache/blob.bin ~/ciriscache_blob.before
          echo "✅ multi-key first-hit-wins verified on ${{ matrix.os }} (skipped the missing key, restored the hit)"

      # v2 prefix `*`: an entry ending in `*` resolves to the most-recent matching
      # tag (version-sorted). First an exact miss, then the run-id prefix → the
      # saved tag is the only match, so it must restore.
      - name: Wipe again before prefix restore
        shell: bash
        run: rm -rf ~/.cargo/registry/cache target
      - name: Restore (prefix * — most-recent match)
        id: pfx
        uses: ./restore
        with:
          package: ghcr.io/cirisai/ciriscache-selftest
          keys: |
            no-such-exact-${{ matrix.os }}-${{ github.run_id }}
            selftest-${{ matrix.os }}-${{ github.run_id }}-*
          token: ${{ secrets.GITHUB_TOKEN }}
      - shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.pfx.outputs.cache-hit }}" = "true" || { echo "prefix: expected a HIT via most-recent match"; exit 1; }
          cmp ~/.cargo/registry/cache/blob.bin ~/ciriscache_blob.before
          echo "✅ prefix most-recent (*) verified on ${{ matrix.os }} — resolved '${{ steps.pfx.outputs.key }}'"
