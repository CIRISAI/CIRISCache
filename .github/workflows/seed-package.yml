name: seed-package

# Creates the real `ghcr.io/cirisai/ciriscache` package by pushing a marker blob,
# so it shows up in Org → Packages and can be made Public + granted repo write
# access (both UI-only, see docs/DESIGN.md). The selftest uses a separate
# `ciriscache-selftest` package; this is the one the substrate repos consume.
# Re-runnable via the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/seed-package.yml"

permissions:
  contents: read
  packages: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: oras-project/setup-oras@v1
      - name: Seed ghcr.io/cirisai/ciriscache
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          printf 'CIRISCache shared build cache — see https://github.com/CIRISAI/CIRISCache\n' > marker.txt
          oras push ghcr.io/cirisai/ciriscache:seed marker.txt:text/plain
          echo "✅ Seeded ghcr.io/cirisai/ciriscache."
          echo "Next (UI, one-time): make the package PUBLIC, then grant"
          echo "CIRISPersist/Edge/Verify/Server WRITE access in the package settings."
