name: "CIRISCache restore"
description: >
  Restore a CI build cache from a GHCR package (free, unlimited for public
  packages, shareable across repos). v2: pass an ordered `keys` list — the FIRST
  key that hits is restored and the rest are SKIPPED. For a layered substrate
  cache the deepest blob is a superset of the shallower ones, so restoring just
  the first hit avoids redundant cumulative extraction.

inputs:
  package:
    description: "GHCR package reference without the tag (lowercase)."
    default: "ghcr.io/cirisai/ciriscache"
  keys:
    description: >
      Newline- or space-separated cache keys in PRIORITY order — most-specific /
      DEEPEST layer first (e.g. server → edge → persist → verify). The first key
      that hits is restored; the rest are skipped (one extraction, not N
      cumulative ones). Takes precedence over `key`.

      An entry ending in `*` is a PREFIX: the most-recent matching tag (version-
      sorted) is restored. Use it to fall back to the latest server `-s<version>`
      blob (lean + complete) before the much larger edge layer — e.g.
      `…-v8.3.0-s*` after the exact `…-s0.5.66`.
    default: ""
  key:
    description: >
      Single explicit key (v1 back-compat). Used only when `keys` is empty. Empty
      AND no `keys` → auto-derive a per-repo key from rustc + lockfiles.
    default: ""
  lockfiles:
    description: "Space-separated files hashed into the auto key (when neither `keys` nor `key` is set)."
    default: "Cargo.lock"
  prefix-key:
    description: "Key namespace; bump to invalidate everything at once."
    default: "v1"
  token:
    description: "GHCR token. Omit for a public package (anonymous pull)."
    default: ""

outputs:
  key:
    description: "The key that was restored (the first hit), or the first resolved key on a full miss."
    value: ${{ steps.pull.outputs.matched }}
  cache-hit:
    description: "true if any key hit + extracted."
    value: ${{ steps.pull.outputs.hit }}

runs:
  using: composite
  steps:
    - uses: oras-project/setup-oras@v1
    - id: pull
      shell: bash
      env:
        CIRISCACHE_TOKEN: ${{ inputs.token }}
        IN_KEYS: ${{ inputs.keys }}
        IN_KEY: ${{ inputs.key }}
      run: |
        set -uo pipefail
        PKG="${{ inputs.package }}"

        # ── Resolve the ordered key list ──────────────────────────────────────
        # `keys` (plural, priority order) wins; else single `key`; else auto-derive.
        RAW="$IN_KEYS"
        if [ -z "${RAW//[[:space:]]/}" ]; then
          if [ -n "$IN_KEY" ]; then
            RAW="$IN_KEY"
          else
            RUSTV=$(rustc -vV 2>/dev/null | sha256sum | cut -c1-12 || echo norustc)
            LOCKH=$( (cat ${{ inputs.lockfiles }} 2>/dev/null || true) | sha256sum | cut -c1-16)
            RAW="${{ inputs.prefix-key }}-${{ runner.os }}-${{ runner.arch }}-${RUSTV}-${LOCKH}"
          fi
        fi
        # Sanitize each to a valid OCI tag (lowercase, [a-z0-9_.-], <=128); keep
        # order. `*` is preserved (a trailing `*` marks a most-recent-prefix entry).
        KEYS=()
        for k in $RAW; do
          k=$(printf '%s' "$k" | tr '[:upper:]' '[:lower:]' | tr -c '*a-z0-9_.-' '-' | cut -c1-128)
          [ -n "$k" ] && KEYS+=("$k")
        done
        if [ ${#KEYS[@]} -eq 0 ]; then
          echo "hit=false" >> "$GITHUB_OUTPUT"; echo "matched=" >> "$GITHUB_OUTPUT"
          echo "CIRISCache: no keys to restore"; exit 0
        fi

        if [ -n "${CIRISCACHE_TOKEN}" ]; then
          printf '%s' "${CIRISCACHE_TOKEN}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
        fi
        # oras is a native Windows binary (wants D:\... paths); tar/rm/mkdir are
        # MSYS and want POSIX (/d/...) — keep both forms (CIRISCache#1).
        DWIN="${RUNNER_TEMP}/ciriscache-dl"; DPX="$DWIN"; FL=""
        if [ "${RUNNER_OS:-}" = "Windows" ]; then DPX="$(cygpath -u "${RUNNER_TEMP}")/ciriscache-dl"; FL="--force-local"; fi

        # ── Try each key in PRIORITY order; FIRST hit wins, then STOP ─────────
        # The deepest layer that exists is a superset of the shallower ones, so a
        # single extraction is sufficient — no cumulative re-extraction. A trailing
        # `*` resolves to the most-recent matching tag (version-sorted) — used to
        # prefer the latest lean server `-s` blob over the larger edge layer.
        n=${#KEYS[@]}
        TAGS=""
        for KEY in "${KEYS[@]}"; do
          RESOLVED="$KEY"
          case "$KEY" in
            *\*)
              PFX="${KEY%\*}"
              # List the package's tags ONCE; pick the most-recent (highest version)
              # match. Version compare is portable (NO `sort -V` — BSD/macOS sort
              # lacks it): strip the prefix, zero-pad each dot-component, lexically
              # max via bash [[ > ]]. Non-numeric components coerce to 0 (awk $n+0).
              [ -z "$TAGS" ] && TAGS=$(oras repo tags "$PKG" 2>/dev/null || true)
              RESOLVED=""; BESTKEY=""
              # Process substitution (not a pipe) so the loop runs in THIS shell and
              # RESOLVED/BESTKEY persist; works on macOS bash 3.2 (no mapfile).
              while IFS= read -r t; do
                case "$t" in
                  "$PFX"*)
                    v="${t#"$PFX"}"
                    vk=$(printf '%s' "$v" | awk -F. '{printf "%010d%010d%010d%010d", $1+0,$2+0,$3+0,$4+0}')
                    if [ -z "$BESTKEY" ] || [[ "$vk" > "$BESTKEY" ]]; then BESTKEY="$vk"; RESOLVED="$t"; fi
                    ;;
                esac
              done < <(printf '%s\n' "$TAGS")
              if [ -z "$RESOLVED" ]; then
                echo "CIRISCache: miss ${PKG}:${KEY} (no tag matches prefix '${PFX}')"
                continue
              fi
              echo "CIRISCache: prefix '${PFX}*' → most-recent '${RESOLVED}'"
              ;;
          esac
          REF="${PKG}:${RESOLVED}"
          rm -rf "$DPX"; mkdir -p "$DPX"
          if oras pull "$REF" -o "$DWIN" 2>/dev/null && [ -f "$DPX/cache.tar.gz" ]; then
            # Tarball stores absolute paths (-P); extract in place. Windows MSYS
            # tar needs --force-local + the POSIX archive path; macOS BSD tar has
            # neither the flag nor the bug (see save/action.yml).
            tar $FL -xzPf "$DPX/cache.tar.gz"
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "matched=$RESOLVED" >> "$GITHUB_OUTPUT"
            echo "CIRISCache: HIT  $REF  (first hit of $n key(s); deeper-or-equal layer restored, shallower skipped)"
            exit 0
          fi
          echo "CIRISCache: miss $REF"
        done
        echo "hit=false" >> "$GITHUB_OUTPUT"
        echo "matched=${KEYS[0]%\*}" >> "$GITHUB_OUTPUT"
        echo "CIRISCache: miss ALL $n key(s) (cold build)"
